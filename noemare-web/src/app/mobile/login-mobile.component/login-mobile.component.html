<div class="login-wrapper">
  
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="login-card">
    
    <div class="login-logo">
      <div class="logo-placeholder">
        <mat-icon>sailing</mat-icon>
      </div>
    </div>

    <div class="header-badge">
      <span class="dot"></span>
      SISTEMA NOÉ MARÉ
    </div>

    <h1>Bem-vindo!</h1>
    <p class="subtitle">Entre com suas credenciais para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLoginMobile()">
      <div class="form-group">
        <label for="email">E-mail de acesso</label>
        <div class="input-container">
          <mat-icon>mail_outline</mat-icon>
          <input 
            id="email"
            type="email" 
            formControlName="email" 
            placeholder="Digite seu e-mail"
            inputmode="email"
            autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <div class="password-header">
          <label for="senha">Senha</label>
          <a class="forgot-link" href="javascript:void(0)" (click)="abrirModalEsqueciSenha()">Esqueceu a senha?</a>
        </div>
        <div class="input-container">
          <mat-icon>lock_outline</mat-icon>
          <input 
            id="senha"
            type="password" 
            formControlName="senha" 
            placeholder="••••••••"
            autocomplete="current-password">
        </div>
      </div>

      <div class="error-container" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <button type="submit" class="btn-entrar" [disabled]="loginForm.invalid || isLoading">
        <mat-icon *ngIf="!isLoading">login</mat-icon>
        <span *ngIf="!isLoading">Acessar Sistema</span>
        <div class="spinner-small" *ngIf="isLoading"></div>
      </button>
    </form>
    
    <div class="login-footer">
      <p>Problemas para acessar? <br>Contate o administrador do sistema.</p>
    </div>
  </div>
</div>
